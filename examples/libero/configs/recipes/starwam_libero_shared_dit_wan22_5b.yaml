# ============================================================================
# StarWAM LIBERO Shared-DiT: DreamZero-aligned Wan2.2-TI2V-5B experiment
# ============================================================================
#
# Training settings
# -----------------
# - Backbone: Wan2.2-TI2V-5B
# - Model family: Shared-DiT WAM with action/state register tokens
# - Dataset: LIBERO spatial + object + goal + libero_10
# - Conditioning: full-video clean context
# - Video geometry: two 160x160 LIBERO cameras concatenated horizontally -> 160x320
# - Normalization: min/max action stats + min/max state/proprio stats
#
# DreamZero-like rollout settings
# -------------------------------
# - Evaluation checkpoint: checkpoint-50000
# - Trials: 50 trials/task, 10 tasks/suite
# - Video inference steps: 16
# - Action inference steps: 16
# - Video/action infer_shift: 5.0 / 5.0
# - Runtime: num_steps_wait=30, replan_steps=10, seed=42, fixed_seed=false
#
# LIBERO rollout results @ checkpoint-50000, 50 trials/task
# ---------------------------------------------------------
# - libero_spatial: 471/500 = 94.2%
# - libero_object:  500/500 = 100.0%
# - libero_goal:    484/500 = 96.8%
# - libero_10:      481/500 = 96.2%
# - Overall micro average: 1936/2000 = 96.8%
# - Overall macro average: 96.8%
# ============================================================================

taxonomy:
  package: starwam
  model_family: shared_dit_wam
  preset: shared_dit_libero_wan22_5b
  action_representation: token_action
  conditioning: full_video

backbone:
  type: wan22_5b
  pretrained_model_id: /path/to/Wan2.2-TI2V-5B
  load_text_encoder: false
  tokenizer_max_len: 128

framework:
  type: shared_dit
  action_dim: 7
  action_gripper_dim: -1
  chunk_size: 32
  proprio_dim: 8
  max_state_dim: 8
  num_frame_per_block: 2
  num_action_per_block: 32
  num_state_per_block: 1
  shared_dit_clean_context: full_video
  shared_dit_pin_first_latent_step: true
  shared_dit_checkpoint_blocks: true

  video_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0
  action_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0

  loss_lambda_video: 1.0
  loss_lambda_action: 1.0

training:
  output_dir: /path/to/output/starwam_libero_shared_dit_wan22_5b
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  batch_size: 8
  gradient_accumulation_steps: 2
  num_epochs: 10
  max_steps: 100000
  mixed_precision: bf16
  max_grad_norm: 1.0
  log_every: 10
  save_every: 2000
  eval_every: 2000
  eval_num_inference_steps: 4
  eval_action_num_inference_steps: 16
  eval_max_samples: 4
  eval_compute_video_psnr: false
  seed: 42
  lr_scheduler_type: cosine
  warmup_steps: null
  min_lr: 0.0
  num_workers: 8
  strategy: full
  save_total_limit: 3
  wandb_enabled: true
  wandb_project: starWAM
  wandb_run_name: starwam_libero_shared_dit_wan22_5b

data:
  dataset_type: lerobot
  dataset_dirs:
    - /path/to/libero_spatial_lerobot
    - /path/to/libero_object_lerobot
    - /path/to/libero_goal_lerobot
    - /path/to/libero_10_lerobot
  video_key: observation.images.image
  video_keys:
    - observation.images.image
    - observation.images.wrist_image
  concat_multi_camera: horizontal
  action_key: action
  state_key: observation.state
  num_frames: 33
  video_size: [160, 160]
  text_len: 128
  text_embedding_cache_dir: /path/to/output/starwam_libero_shared_dit_wan22_5b/text_embedding_cache
  action_freq_ratio: 4
  normalize_actions: true
  action_norm_mode: minmax
  action_stats_path: /path/to/output/starwam_libero_shared_dit_wan22_5b/action_stats.json
  normalize_states: true
  state_norm_mode: minmax
  state_stats_path: /path/to/output/starwam_libero_shared_dit_wan22_5b/action_stats.json
  delta_action_dim_mask: [true, true, true, true, true, true, false]
  val_split: 0.0
  val_split_seed: 42

inference:
  num_inference_steps: 16
  action_num_inference_steps: 16
  seed: 42
