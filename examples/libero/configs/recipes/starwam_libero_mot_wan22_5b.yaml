# ============================================================================
# StarWAM LIBERO MoT: Fast-WAM-aligned 8-GPU experiment
# ============================================================================
#
# Training settings
# -----------------
# - Backbone: Wan2.2-TI2V-5B
# - Model family: MoT WAM with ActionDiT-initialized action expert
# - Dataset: LIBERO spatial + object + goal + libero_10
# - Dataset size: 273,465 train samples expanded from 1,693 episodes
# - Text prompts: 40 unique LIBERO task instructions
# - Normalization: min/max action stats + min/max state/proprio stats
#
# Fast-WAM schedule alignment
# ---------------------------
# - Fast-WAM reference: batch_size=16, grad_acc=1, world_size=8, global_batch=128
# - This recipe: batch_size=8, grad_acc=2, world_size=8, effective_global_batch=128
# - num_epochs=10, max_steps=null -> derived max_steps=21,370
# - warmup_ratio=0.05 -> warmup_steps=1,068
# - Scheduler: cosine, lr=1e-4 -> eta_min=1e-6
# - Training completed: step=21,370; evaluation used checkpoint-20000
#
# LIBERO rollout settings
# -----------------------
# - Evaluation checkpoint: checkpoint-20000
# - Trials: 50 trials/task, 10 tasks/suite
# - Action inference steps: 8 (`inference.num_inference_steps`; MoT does not use decoupled action steps)
# - Video/action infer_shift: 5.0 / 5.0
# - Runtime: num_steps_wait=30, replan_steps=10, seed=42, fixed_seed=false
#
# LIBERO rollout results @ checkpoint-20000, 50 trials/task
# ---------------------------------------------------------
# - libero_spatial: 481/500 = 96.2%
# - libero_object:  495/500 = 99.0%
# - libero_goal:    487/500 = 97.4%
# - libero_10:      469/500 = 93.8%
# - Overall micro average: 1932/2000 = 96.6%
# - Overall macro average: 96.6%
# ============================================================================

taxonomy:
  package: starwam
  model_family: mot_wam
  preset: mot_libero_fastwam_aligned
  action_representation: token_action
  conditioning: first_frame

backbone:
  type: wan22_5b
  pretrained_model_id: /path/to/Wan2.2-TI2V-5B
  load_text_encoder: false
  tokenizer_max_len: 128

framework:
  type: mot
  action_dim: 7
  action_gripper_dim: -1
  chunk_size: 32
  proprio_dim: 8
  action_video_conditioning: first_frame
  mot_checkpoint_mixed_attn: false
  action_expert_hidden_dim: 1024
  action_expert_init_from: /path/to/preprocessed/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt
  action_expert_head_init: random
  action_expert_use_gradient_checkpointing: false

  video_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0
  action_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0

  loss_lambda_video: 1.0
  loss_lambda_action: 1.0

training:
  output_dir: /path/to/output/starwam_libero_mot_wan22_5b
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  batch_size: 8
  gradient_accumulation_steps: 2
  num_epochs: 10
  max_steps: null
  mixed_precision: bf16
  max_grad_norm: 1.0
  log_every: 10
  save_every: 2000
  eval_every: 200
  eval_num_inference_steps: 4
  eval_max_samples: 4
  eval_compute_video_psnr: false
  seed: 42
  lr_scheduler_type: cosine
  warmup_steps: null
  min_lr: 0.0
  num_workers: 8
  strategy: full
  save_total_limit: 3
  wandb_enabled: true
  wandb_project: starWAM
  wandb_run_name: starwam_libero_mot_wan22_5b

data:
  format: lerobot
  dataset_type: lerobot
  dataset_dirs:
    - /path/to/libero_spatial_lerobot
    - /path/to/libero_object_lerobot
    - /path/to/libero_goal_lerobot
    - /path/to/libero_10_lerobot
  video_key: observation.images.image
  video_keys:
    - observation.images.image
    - observation.images.wrist_image
  concat_multi_camera: horizontal
  action_key: action
  state_key: observation.state
  num_frames: 33
  video_size: [224, 224]
  text_len: 128
  text_embedding_cache_dir: /path/to/output/starwam_libero_mot_wan22_5b/text_embedding_cache
  text_prompt_template: "A video recorded from a robot's point of view executing the following instruction: {task}"
  text_cache_encoder_id: wan22ti2v5b
  action_freq_ratio: 4
  normalize_actions: true
  action_norm_mode: minmax
  action_stats_path: /path/to/output/starwam_libero_mot_wan22_5b/action_stats.json
  normalize_states: true
  state_norm_mode: minmax
  state_stats_path: /path/to/output/starwam_libero_mot_wan22_5b/action_stats.json
  action_gripper_dim: -1
  delta_action_dim_mask: [true, true, true, true, true, true, false]
  val_split: 0.0
  val_split_seed: 42

inference:
  mode: cached
  num_inference_steps: 8
  # MoT uses a single denoising schedule, so rollout overrides this to
  # num_inference_steps. This field is kept for schema consistency with
  # Shared-DiT recipes that support decoupled action steps.
  action_num_inference_steps: 20
  seed: 42
