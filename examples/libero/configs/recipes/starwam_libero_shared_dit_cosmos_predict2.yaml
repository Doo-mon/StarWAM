# ============================================================================
# StarWAM LIBERO Shared-DiT: Cosmos-Predict2-2B Video2World experiment
# ============================================================================
#
# Training settings
# -----------------
# - Backbone: Cosmos-Predict2-2B-Video2World
# - Model family: Shared-DiT WAM with action/state register tokens
# - Dataset: LIBERO spatial + object + goal + libero_10
# - Conditioning: full-video clean context
# - Video geometry: two 320x320 LIBERO cameras concatenated horizontally -> 320x640
# - Normalization: min/max action stats + min/max state/proprio stats
#
# Notes
# -----
# - Cosmos-specific Shared-DiT token packing, RoPE, timestep modulation, and
#   native transformer block adaptation live in the Cosmos backbone/core layer.
# - Text caches use a Cosmos-specific encoder id and are not shared with Wan
#   UMT5 caches.
# ============================================================================

taxonomy:
  package: starwam
  model_family: shared_dit_wam
  preset: shared_dit_libero_cosmos_predict2
  action_representation: token_action
  conditioning: full_video

backbone:
  type: cosmos_predict2
  pretrained_model_id: /path/to/Cosmos-Predict2-2B-Video2World
  load_text_encoder: false
  tokenizer_max_len: 512

framework:
  type: shared_dit
  action_dim: 7
  action_gripper_dim: -1
  chunk_size: 32
  proprio_dim: 8
  max_state_dim: 8
  frame_seqlen: 200
  num_frame_per_block: 2
  num_action_per_block: 32
  num_state_per_block: 1
  shared_dit_clean_context: full_video
  shared_dit_pin_first_latent_step: true
  shared_dit_checkpoint_blocks: true
  concat_first_frame_latent: false

  video_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0
  action_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0

  loss_lambda_video: 1.0
  loss_lambda_action: 1.0

training:
  output_dir: /path/to/output/starwam_libero_shared_dit_cosmos_predict2
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 10
  max_steps: 100000
  mixed_precision: bf16
  max_grad_norm: 1.0
  log_every: 10
  save_every: 2000
  eval_every: 2000
  eval_num_inference_steps: 4
  eval_max_samples: 4
  eval_compute_video_psnr: false
  seed: 42
  lr_scheduler_type: cosine
  warmup_steps: null
  min_lr: 0.0
  num_workers: 8
  strategy: full
  save_total_limit: 3
  wandb_enabled: true
  wandb_project: starWAM
  wandb_run_name: starwam_libero_shared_dit_cosmos_predict2

data:
  format: lerobot
  dataset_type: lerobot
  dataset_dirs:
    - /path/to/libero_spatial_no_noops_1.0.0_lerobot
    - /path/to/libero_object_no_noops_1.0.0_lerobot
    - /path/to/libero_goal_no_noops_1.0.0_lerobot
    - /path/to/libero_10_no_noops_1.0.0_lerobot
  video_key: observation.images.image
  video_keys:
    - observation.images.image
    - observation.images.wrist_image
  concat_multi_camera: horizontal
  action_key: action
  state_key: observation.state
  num_frames: 33
  video_size: [320, 320]
  text_len: 512
  text_embedding_cache_dir: /path/to/output/starwam_libero_shared_dit_cosmos_predict2/text_embedding_cache
  text_prompt_template: "A video recorded from a robot's point of view executing the following instruction: {task}"
  text_cache_encoder_id: cosmos_predict2_t5
  action_freq_ratio: 4
  normalize_actions: true
  action_norm_mode: minmax
  action_stats_path: /path/to/output/starwam_libero_shared_dit_cosmos_predict2/action_stats.json
  normalize_states: true
  state_norm_mode: minmax
  state_stats_path: /path/to/output/starwam_libero_shared_dit_cosmos_predict2/action_stats.json
  action_gripper_dim: -1
  delta_action_dim_mask: [true, true, true, true, true, true, false]
  val_split: 0.0
  val_split_seed: 42

inference:
  mode: cached
  num_inference_steps: 16
  action_num_inference_steps: 16
  seed: 42
