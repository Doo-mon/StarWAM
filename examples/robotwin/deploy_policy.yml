# RoboTwin deploy-policy config for StarWAM.
#
# Consumed by the official RoboTwin eval harness:
#   python script/eval_policy.py --config policy/<name>/deploy_policy.yml \
#     --overrides task_name=<task> task_config=<clean|demo_randomized> ...
#
# The keys under `policy` are forwarded to `deploy_policy.get_model(usr_args)`.
# NOTE: verify the exact key names / override plumbing against the RoboTwin
# version you deploy (harness field names can differ between releases).

policy:
  policy_name: starwam
  # StarWAM recipe used for training this checkpoint.
  config_path: examples/robotwin/configs/recipes/starwam_robotwin_mot_wan22_5b.yaml
  # Trained StarWAM checkpoint (dir with model.pt / mp_rank_00_model_states.pt,
  # or a direct .pt file).
  checkpoint: /path/to/output/starwam_robotwin_mot_wan22_5b/checkpoint-XXXX
  # Recipe overrides applied at eval time (space-separated key=value).
  overrides: >-
    backbone.pretrained_model_id=/path/to/Wan2.2-TI2V-5B
    data.action_stats_path=/path/to/output/starwam_robotwin_mot_wan22_5b/action_stats.json
    data.state_stats_path=/path/to/output/starwam_robotwin_mot_wan22_5b/action_stats.json
    data.text_embedding_cache_dir=/path/to/output/starwam_robotwin_mot_wan22_5b/text_embedding_cache
  device: cuda:0
  # MoT uses a single denoising schedule.
  num_inference_steps: 8
  # Fast-WAM RoboTwin eval replans every 24 of 32 chunk steps.
  replan_steps: 24
  seed: 42
