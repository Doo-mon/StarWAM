# ============================================================================
# StarWAM RoboTwin 2.0 MoT: Wan2.2-TI2V-5B (Fast-WAM-aligned)
# ============================================================================
#
# Dual-arm (bimanual) RoboTwin 2.0 recipe for the MoT WAM family.
# Mirrors the LIBERO MoT recipe, with RoboTwin-specific dims/cameras.
#
# Data source
# -----------
# - LeRobot v2.1 dataset: `yuanty/robotwin2.0-fastwam` (Fast-WAM preprocessed).
# - Verified against meta/info.json: codebase_version=v2.1, robot_type=aloha,
#   action/state = 14-D dual-arm qpos (left 6 joints + left_gripper[idx6],
#   right 6 joints + right_gripper[idx13]), cameras cam_high/cam_left_wrist/
#   cam_right_wrist (480x640), fps=50, 27500 episodes.
# - dataset_stats.json ships with the dataset; StarWAM recomputes its own
#   z-score stats from the LeRobot data so train/eval stay self-consistent.
#
# Sampling (matches Fast-WAM's configs/data/robotwin.yaml exactly)
# ----------------------------------------------------------------
# - num_frames=33, action_freq_ratio=4 -> 32 action steps, 9 video frames.
# - NO temporal downsampling (Fast-WAM global_sample_stride=1); StarWAM samples
#   consecutive frames at native 50 fps (~0.64s per 32-step chunk).
# ============================================================================

taxonomy:
  package: starwam
  model_family: mot_wam
  preset: null            # RoboTwin has no strict preset validator (allowed)
  action_representation: token_action
  conditioning: first_frame

backbone:
  type: wan22_5b
  pretrained_model_id: /path/to/Wan2.2-TI2V-5B
  load_text_encoder: false
  tokenizer_max_len: 128

framework:
  type: mot
  action_dim: 14          # dual-arm 14-D qpos (verified via meta/info.json)
  action_gripper_dim: -1
  chunk_size: 32
  proprio_dim: 14         # dual-arm 14-D state (verified via meta/info.json)
  action_video_conditioning: first_frame
  mot_checkpoint_mixed_attn: false
  action_expert_hidden_dim: 1024
  # Same Wan2.2 ActionDiT init payload as LIBERO MoT; the action head is
  # randomly initialized so it adapts to the 14-D action space.
  action_expert_init_from: /path/to/preprocessed/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt
  action_expert_head_init: random
  action_expert_use_gradient_checkpointing: false

  video_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0
  action_scheduler:
    num_train_timesteps: 1000
    train_shift: 5.0
    infer_shift: 5.0

  loss_lambda_video: 1.0
  loss_lambda_action: 1.0

training:
  output_dir: /path/to/output/starwam_robotwin_mot_wan22_5b
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  # Fast-WAM RoboTwin target: GLOBAL batch = 1024 (they use 64 GPUs x
  # per_device 16 x grad_accum 1). Keep the *global* batch at 1024 and
  # lr=1e-4 regardless of how many GPUs you have; set grad_accum so that
  #   per_device_batch (8) x grad_accum x num_gpus == 1024:
  #     64 GPUs -> grad_accum 2   (8 x 2 x 64 = 1024)
  #     16 GPUs -> grad_accum 8   (8 x 8 x 16 = 1024)   [2 nodes x 8]
  #      8 GPUs -> grad_accum 16  (8 x 16 x 8 = 1024)   [single node, default below]
  # At global batch 1024, 5 epochs over ~6.07M frames ~= 29.7k optimizer
  # steps (matches the paper's ~30k), warmup 5% ~= 1.48k.
  batch_size: 8
  gradient_accumulation_steps: 16
  num_epochs: 5
  max_steps: null
  mixed_precision: bf16
  max_grad_norm: 1.0
  log_every: 10
  save_every: 2500
  eval_every: 500
  eval_num_inference_steps: 4
  eval_max_samples: 4
  eval_compute_video_psnr: false
  seed: 42
  lr_scheduler_type: cosine
  warmup_steps: null      # null -> 5% of total steps (Fast-WAM convention)
  min_lr: 0.0
  num_workers: 8          # safe now that the T5-cache/video-decode leaks in data/lerobot.py are fixed
  strategy: full
  save_total_limit: 3
  wandb_enabled: true
  wandb_project: starWAM
  wandb_run_name: starwam_robotwin_mot_wan22_5b

data:
  dataset_type: lerobot
  dataset_dirs:
    - /root/paddlejob/workspace/env_run/robotwin2.0-fastwam/robotwin2.0
  # Camera order MUST be [head, left_wrist, right_wrist] for the robotwin
  # concat layout. Keys verified against meta/info.json.
  video_key: observation.images.cam_high
  video_keys:
    - observation.images.cam_high
    - observation.images.cam_left_wrist
    - observation.images.cam_right_wrist
  concat_multi_camera: robotwin   # head(256x320) over [left|right](128x160 each) -> 384x320
  action_key: action
  state_key: observation.state
  num_frames: 33
  video_size: [384, 320]          # robotwin concat already yields 384x320
  text_len: 128
  text_embedding_cache_dir: /path/to/output/starwam_robotwin_mot_wan22_5b/text_embedding_cache
  text_prompt_template: "A video recorded from a robot's point of view executing the following instruction: {task}"
  text_cache_encoder_id: wan22ti2v5b
  action_freq_ratio: 4            # 32 action steps, 9 sampled video frames
  normalize_actions: true
  action_norm_mode: zscore        # Fast-WAM uses z-score for RoboTwin
  action_stats_path: /path/to/output/starwam_robotwin_mot_wan22_5b/action_stats.json
  normalize_states: true
  state_norm_mode: zscore
  state_stats_path: /path/to/output/starwam_robotwin_mot_wan22_5b/action_stats.json
  delta_action_dim_mask: null     # absolute qpos actions; no delta padding mask
  val_split: 0.0
  val_split_seed: 42

inference:
  num_inference_steps: 8
  # MoT uses a single denoising schedule, so rollout overrides this to
  # num_inference_steps. Kept for schema consistency with Shared-DiT recipes.
  action_num_inference_steps: 20
  seed: 42
